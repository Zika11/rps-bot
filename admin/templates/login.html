<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="height:100vh;">
<div class="card bg-secondary p-4" style="width:350px;">
    <h3 class="text-center mb-3">لوحة تحكم RPS</h3>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post">
        <input name="username" class="form-control mb-2" placeholder="المستخدم" required>
        <input name="password" type="password" class="form-control mb-3" placeholder="كلمة المرور" required>
        <button class="btn btn-primary w-100">دخول</button>
    </form>
</div>
</body>
</html>
