<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-white">
<nav class="navbar navbar-expand-lg navbar-dark bg-black">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">RPS Admin</a>
    <div class="navbar-nav me-auto">
      <a class="nav-link" href="/users">المستخدمين</a>
      <a class="nav-link" href="/clans">العشائر</a>
      <a class="nav-link" href="/broadcast">رسالة شاملة</a>
      <a class="nav-link" href="/logout">خروج</a>
    </div>
  </div>
</nav>
<div class="container mt-4">
    <div class="row">
        <div class="col-md-4"><div class="card bg-primary p-3"><h4>👥 {{ total_users }}</h4><p>مستخدم</p></div></div>
        <div class="col-md-4"><div class="card bg-success p-3"><h4>🎮 {{ total_games }}</h4><p>مباراة نشطة</p></div></div>
        <div class="col-md-4"><div class="card bg-warning p-3"><h4>🏰 {{ total_clans }}</h4><p>عشيرة</p></div></div>
    </div>
    <div class="row mt-4">
        <div class="col-md-6">
            <canvas id="activityChart"></canvas>
        </div>
        <div class="col-md-6">
            <h5>أفضل 5 لاعبين</h5>
            <ul class="list-group">
                {% for u in top_ratings %}
                <li class="list-group-item bg-secondary text-white">{{ u.first_name }} - {{ u.rating }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
<script>
const ctx = document.getElementById('activityChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: [{% for d in daily_activity %}'{{ d.date }}',{% endfor %}],
        datasets: [{
            label: 'نشاط يومي',
            data: [{% for d in daily_activity %}{{ d.count }},{% endfor %}],
            borderColor: '#0d6efd',
            tension: 0.3
        }]
    }
});
</script>
</body>
</html>
